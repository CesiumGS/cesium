<!doctype html>
<html lang="en">
  <head>
    <script src="Build/CesiumUnminified/Cesium.js"></script>
    <link href="Build/CesiumUnminified/Widgets/widgets.css" rel="stylesheet" />
    <style>
      html,
      body,
      #cesiumContainer {
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden;
      }
      #toolbar {
        position: absolute;
        top: 10px;
        left: 10px;
        z-index: 100;
        background: rgba(42, 42, 42, 0.8);
        padding: 10px;
        border-radius: 5px;
      }
      #toolbar button {
        margin: 5px;
        padding: 8px 16px;
      }
    </style>
  </head>
  <body>
    <div id="cesiumContainer"></div>
    <div id="toolbar">
      <button id="toggleTileCoords">Hide Tile Coordinates</button>
      <div id="info" style="color: white">Loading hybrid terrain...</div>
    </div>

    <script>
      /* global Cesium */
      const { Cartesian3, Math: CesiumMath } = Cesium;

      const viewer = new Cesium.Viewer("cesiumContainer", {});

      const tileCoordsLayer = viewer.imageryLayers.addImageryProvider(
        new Cesium.TileCoordinatesImageryProvider({
          color: Cesium.Color.YELLOW,
        }),
      );

      document.getElementById("toggleTileCoords").onclick = function () {
        tileCoordsLayer.show = !tileCoordsLayer.show;
        this.textContent = tileCoordsLayer.show
          ? "Hide Tile Coordinates"
          : "Show Tile Coordinates";
      };

      viewer.camera.setView({
        destination: new Cartesian3(
          -3046596.558550092,
          4065701.630895504,
          3854536.407434127,
        ),
        orientation: {
          heading: CesiumMath.toRadians(0),
          pitch: CesiumMath.toRadians(-45),
          roll: 0.0,
        },
      });

      (async function setupTerrain() {
        try {
          const terrain = Cesium.Terrain.fromWorldTerrain({
            requestVertexNormals: true,
          });

          const provider = await new Promise((resolve) => {
            terrain.readyEvent.addEventListener(() =>
              resolve(terrain.provider),
            );
          });

          // Region 1: Level 13 world terrain covering area A
          const region = {
            provider,
            tiles: new Map().set(13, { x: [13963, 13967], y: [2389, 2393] }),
          };

          // Region 2: Level 13 world terrain covering area B
          const region2 = {
            provider,
            tiles: new Map().set(13, { x: [13956, 13959], y: 2392 }),
          };

          // Region 3: Level 14 ellipsoid terrain (higher zoom override)
          const region3 = {
            provider: new Cesium.EllipsoidTerrainProvider(),
            tiles: new Map().set(14, { x: [27930, 27931], y: [4784, 4785] }),
          };

          const hybrid = new Cesium.HybridTerrainProvider({
            regions: [region, region2, region3],
            defaultProvider: new Cesium.EllipsoidTerrainProvider(),
          });

          viewer.terrainProvider = hybrid;

          document.getElementById("info").innerHTML =
            "HybridTerrainProvider applied!<br>" +
            `Regions: ${hybrid.regions.length}<br>` +
            `Has Water Mask: ${hybrid.hasWaterMask}<br>` +
            `Has Vertex Normals: ${hybrid.hasVertexNormals}`;
        } catch (error) {
          console.error("Error setting up terrain:", error);
          document.getElementById("info").innerHTML = `Error: ${error.message}`;
        }
      })();
    </script>
  </body>
</html>
