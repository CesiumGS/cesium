id: no-public-static-fields
message: >
  Static fields in ES6 class bodies are not supported by tsd-jsdoc, and
  will output as instance fields. For public fields, use assignments onto
  the constructor (`MyClass.STATIC_PROP = 123`) instead.
severity: error
language: JavaScript
files:
  - packages/engine/Source/**/*.js
rule:
  pattern:
    selector: field_definition
    context: class $CLASS { static $FIELD = $INIT }
  # Ignore undocumented static fields.
  follows:
    kind: comment
  not:
    any:
      # Ignore internal/private static fields.
      - follows:
          kind: comment
          regex: "@ignore|@private"
      # Ignore static fields on non-public classes.
      - inside:
          kind: class_declaration
          stopBy: end
          follows:
            kind: comment
            regex: "@ignore|@private"
