id: no-export-object-freeze
valid:
  - >
    /** @enum {number} */
    const MyInteger = { ONE: 1, TWO: 2 };
    Object.freeze(MyInteger);
    export default MyInteger;
invalid:
  - >
    /** @enum {number} */
    const MyInteger = { ONE: 1, TWO: 2 };
    export default Object.freeze(MyInteger);
  - >
    /** @enum {number} */
    const MyInteger = { ONE: 1, TWO: 2 };
    MyInteger.validate = () => {};
    export default Object.freeze(MyInteger);
