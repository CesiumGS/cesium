<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no"
    />
  </head>
  <body>
    <style>
      @import "../../Source/Widgets/widgets.css";
      @import "../../Source/Widgets/lighter.css";
      html {
        height: 100%;
      }
      body {
        background: #000;
        color: #eee;
        font-family: sans-serif;
        font-size: 9pt;
        padding: 0;
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
      }
      .fullSize {
        display: block;
        position: absolute;
        top: 0;
        left: 0;
        border: none;
        width: 100%;
        height: 100%;
      }
      #loadingOverlay {
        position: absolute;
        top: 0;
        left: 0;
        opacity: 0.9;
        width: 100%;
        height: 100%;
        display: none;
      }
      #loadingOverlay h1 {
        text-align: center;
        position: relative;
        top: 50%;
        margin-top: -0.5em;
      }
      .sandcastle-loading #loadingOverlay {
        display: block;
      }
      .sandcastle-loading #toolbar {
        display: none;
      }
      #toolbar {
        margin: 5px;
        padding: 2px 5px;
        position: absolute;
      }
      .infoPanel {
        background: #2a2a2acc;
        padding: 4px;
        border: 1px solid #444;
        border-radius: 4px;
      }
    </style>
    <div id="cesiumContainer" class="fullSize"></div>
  </body>
</html>
