name: deploy
on:
  push:
    branches-ignore:
      - 'cesium.com'
      - production
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true
jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      statuses: write
      contents: read
    env:
      BUILD_VERSION: ${{ github.ref_name }}.${{ github.run_number }}
      AWS_ACCESS_KEY_ID: ${{ secrets.DEV_AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.DEV_AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: us-east-1
      BRANCH: ${{ github.ref_name }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GITHUB_REPO: ${{ github.repository }}
      GITHUB_SHA: ${{ github.sha }}
      BASE_URL: /cesium/${{ github.ref_name }}/
      DEPLOYED_URL: https://ci-builds.cesium.com/cesium/${{ github.ref_name }}/
      ZIP_URL: ${{ env.DEPLOYED_URL }}Cesium-${{ env.BUILD_VERSION }}.zip
      NPM_URL: ${{ env.DEPLOYED_URL }}cesium-${{ env.BUILD_VERSION }}.tgz
    steps:
      - uses: actions/checkout@v5
      - name: install node 22
        uses: actions/setup-node@v5
        with:
          node-version: '22'
      - name: npm install
        run: npm install
      - name: set status pending
        if: ${{ env.AWS_ACCESS_KEY_ID != '' }}
        run: |
          node ./scripts/setDeployStatus.js pending "Cesium-1.XXX.zip" $ZIP_URL
          node ./scripts/setDeployStatus.js pending "npm package" $NPM_URL
          node ./scripts/setDeployStatus.js pending "index.html" $DEPLOYED_URL
      - name: set the version in package.json
        run: npm run deploy-set-version -- --buildVersion $BUILD_VERSION
      - name: create release zip
        run: npm run make-zip
      - name: package cesium module
        run: npm pack &> /dev/null
      - name: package workspace modules
        run: npm pack --workspaces &> /dev/null
      - name: build apps
        run: npm run build-apps
      - name: build sandcastle v2
        run: npm run build-ci -w packages/sandcastle -- -l warn
      - uses: ./.github/actions/verify-package
      - name: deploy to s3
        if: ${{ env.AWS_ACCESS_KEY_ID != '' }}
        run: |
          aws s3 sync . s3://cesium-public-builds/cesium/$BRANCH/ \
          --cache-control "no-cache" \
          --exclude ".git/*" \
          --exclude ".github/*" \
          --exclude ".husky/*" \
          --exclude ".vscode/*" \
          --exclude "Build/Coverage/*" \
          --exclude "Build/CesiumDev/*" \
          --exclude "Build/Specs/e2e" \
          --exclude "Documentation/*" \
          --exclude "node_modules/*" \
          --exclude "scripts/*" \
          --exclude "Tools/*" \
          --delete
      - name: set status success
        if: ${{ env.AWS_ACCESS_KEY_ID != '' }}
        run: |
          node ./scripts/setDeployStatus.js success "Cesium-1.XXX.zip" $ZIP_URL
          node ./scripts/setDeployStatus.js success "npm package" $NPM_URL
          node ./scripts/setDeployStatus.js success "index.html" $DEPLOYED_URL
