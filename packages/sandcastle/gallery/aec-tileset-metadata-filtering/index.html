<style>
  @import url(../templates/bucket.css);

  #categoryPanel {
    position: absolute;
    top: 60px;
    left: 5px;
    width: 400px;
    max-height: calc(100% - 100px);
    background: rgba(38, 38, 38, 0.92);
    color: #eee;
    border-radius: 6px;
    padding: 10px;
    font-family:
      -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    font-size: 13px;
    overflow-y: auto;
    overflow-x: hidden;
    z-index: 100;
  }
  #categoryPanel h4 {
    margin: 0 0 8px;
    font-size: 13px;
    color: #8cf;
  }
  .btn-row {
    display: flex;
    gap: 4px;
    margin-bottom: 8px;
  }
  .btn-row button {
    flex: 1;
    padding: 5px 8px;
    cursor: pointer;
    font-size: 12px;
    border: 1px solid #555;
    background: #333;
    color: #fff;
    border-radius: 4px;
  }
  .btn-row button:hover {
    background: #444;
  }
  .cat-row {
    display: flex;
    align-items: center;
    padding: 2px 0;
    white-space: nowrap;
  }
  .cat-row input[type="checkbox"] {
    margin-right: 4px;
    cursor: pointer;
    flex-shrink: 0;
  }
  .cat-label {
    cursor: pointer;
    font-weight: bold;
    user-select: none;
    flex: 1;
    font-size: 12px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .cat-label::before {
    content: "\25B6  ";
    font-size: 9px;
    color: #888;
  }
  .cat-label.no-expand::before {
    content: "";
  }
  .cat-label.open::before {
    content: "\25BC  ";
  }
  .subs {
    display: none;
    padding-left: 22px;
  }
  .subs.open {
    display: block;
  }
  .subs label {
    display: block;
    padding: 2px 0;
    font-size: 12px;
    color: #ccc;
    cursor: pointer;
  }
  .subs label:hover {
    color: #fff;
  }
  .subs input[type="checkbox"] {
    margin-right: 5px;
  }
</style>
<div id="cesiumContainer" class="fullSize"></div>
<div id="categoryPanel">
  <h4>Categories</h4>
</div>
<div id="toolbar"></div>
