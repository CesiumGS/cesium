<style>
  @import url(../templates/bucket.css);
  #toolbar {
    background: rgba(42, 42, 42, 0.8);
    padding: 4px;
    border-radius: 4px;
  }
  #toolbar button {
    margin: 2px 4px;
    padding: 4px 12px;
    cursor: pointer;
  }
  #status {
    color: #fff;
    padding: 4px 8px;
    font-size: 13px;
  }
</style>
<div id="cesiumContainer" class="fullSize"></div>
<div id="loadingOverlay"><h1>Loading...</h1></div>
<div id="toolbar">
  <button id="btnGenerate" type="button">Generate Clips</button>
  <button id="btnGenerateFootprints" type="button">Generate Polygons</button>
  <button id="btnGenerateDefault" type="button">Generate Outlines</button>
  <button id="btnClear" type="button">Clear</button>
  <button id="btnToggleMesh" type="button">Hide Mesh</button>
  <br />
  <label style="color: #fff; font-size: 13px; padding: 4px 8px">
    Min Geometric Error:
    <select id="geomErrorSelect">
      <option value="256">256</option>
      <option value="128">128</option>
      <option value="64" selected>64</option>
      <option value="32">32</option>
      <option value="16">16</option>
      <option value="8">8</option>
      <option value="0">0</option>
    </select>
  </label>
  <span id="status">Footprints: 0</span>
</div>
